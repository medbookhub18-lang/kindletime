<svg width="600" height="180" viewBox="0 0 600 180" xmlns="http://www.w3.org/2000/svg">

  <!-- Gradient -->
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366F1"></stop>
      <stop offset="100%" stop-color="#22C55E"></stop>
    </linearGradient>
  </defs>

  <!-- Icon circle -->
  <circle cx="90" cy="90" r="55" fill="url(#g1)"></circle>

  <!-- Book -->
  <path d="M65 60 h50 v60 h-50 z" fill="white" opacity="0.9"></path>
  <path d="M90 60 v60" stroke="#6366F1" stroke-width="2"></path>

  <!-- Clock -->
  <circle cx="90" cy="90" r="18" fill="white"></circle>
  <line x1="90" y1="90" x2="90" y2="80" stroke="#22C55E" stroke-width="2"></line>
  <line x1="90" y1="90" x2="100" y2="95" stroke="#22C55E" stroke-width="2"></line>

  <!-- Text -->
  <text x="170" y="95" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#111827">
    kindle
  </text>

  <text x="345" y="95" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="url(#g1)">
    time
  </text>

  <!-- Subtitle -->
  <text x="172" y="125" font-family="Arial, sans-serif" font-size="15" fill="#6B7280">
    Your smart reading platform
  </text>

</svg>